map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $http_origin $ttyd_host {
    default $http_host;
    "~^https?://([^/]+)" $1;
}

map $http_user_agent $is_mobile_ua {
    default 0;
    "~*(iphone|ipod|ipad|android|mobile)" 1;
}

server {
    listen 80;
    server_name _;
    absolute_redirect off;

    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/htpasswd_ttyd;

    location = /healthz {
        auth_basic off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        proxy_pass http://unix:/run/codex-bridge/codex-bridge.sock:/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    location /ttyd/ {
        proxy_pass http://unix:/run/ttyd/ttyd.sock:/ttyd/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $ttyd_host;
        proxy_set_header Origin $http_origin;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    location = /term {
        return 302 /term/;
    }
    location /term/ {
        return 302 /ttyd/;
    }

    location = /code {
        return 302 /;
    }
    location /code/ {
        return 302 /;
    }

    location = /ide {
        if ($is_mobile_ua) { return 302 /; }
        return 302 /ide/;
    }
    location /ide/ {
        if ($is_mobile_ua) { return 302 /; }
        proxy_pass http://unix:/run/code-server/code-server.sock:/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    location / {
        root /usr/share/nginx/html/mobile;
        try_files $uri /index.html;
    }
}
